x-cn-service: &cn-service
  build:
    context: .
  env_file:
    - .env
  networks:
    - cn
  depends_on:
    - postgres

services:
  postgres:
    build:
      context: ./docker/postgres-age
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - cn

  user-api:
    <<: *cn-service
    command: ["user-api"]
    environment:
      USER_API_ADDR: ${USER_API_ADDR}
    volumes:
      - cn_data:/data
    expose:
      - "8080"
    ports:
      - "8080:8080"

  relay:
    <<: *cn-service
    command: ["relay"]
    environment:
      RELAY_ADDR: ${RELAY_ADDR}
    expose:
      - "8082"
    ports:
      - "${RELAY_HOST_BIND_IP:-0.0.0.0}:8082:8082"
      - "${RELAY_P2P_HOST_BIND_IP:-0.0.0.0}:11223:11223/udp"

  cn-iroh-relay:
    build:
      context: ./docker/iroh-relay
    profiles:
      - bootstrap
    environment:
      IROH_RELAY_DEV: ${IROH_RELAY_DEV}
      IROH_RELAY_CONFIG_PATH: ${IROH_RELAY_CONFIG_PATH}
      IROH_RELAY_ENABLE_QUIC_ADDR_DISCOVERY: ${IROH_RELAY_ENABLE_QUIC_ADDR_DISCOVERY:-0}
      IROH_RELAY_HTTP_BIND_ADDR: ${IROH_RELAY_HTTP_BIND_ADDR:-0.0.0.0:3340}
      IROH_RELAY_HTTPS_BIND_ADDR: ${IROH_RELAY_HTTPS_BIND_ADDR:-0.0.0.0:443}
      IROH_RELAY_QUIC_BIND_ADDR: ${IROH_RELAY_QUIC_BIND_ADDR:-0.0.0.0:7842}
      IROH_RELAY_TLS_CERT_MODE: ${IROH_RELAY_TLS_CERT_MODE:-Manual}
      IROH_RELAY_TLS_CERT_DIR: ${IROH_RELAY_TLS_CERT_DIR:-/certs}
      IROH_RELAY_TLS_MANUAL_CERT_PATH: ${IROH_RELAY_TLS_MANUAL_CERT_PATH:-/certs/default.crt}
      IROH_RELAY_TLS_MANUAL_KEY_PATH: ${IROH_RELAY_TLS_MANUAL_KEY_PATH:-/certs/default.key}
      IROH_RELAY_TLS_PROD: ${IROH_RELAY_TLS_PROD:-1}
      IROH_RELAY_TLS_DANGEROUS_HTTP_ONLY: ${IROH_RELAY_TLS_DANGEROUS_HTTP_ONLY:-1}
      IROH_RELAY_TLS_HOSTNAME: ${IROH_RELAY_TLS_HOSTNAME:-}
      IROH_RELAY_TLS_CONTACT: ${IROH_RELAY_TLS_CONTACT:-}
      RUST_LOG: ${IROH_RELAY_LOG_LEVEL}
    expose:
      - "3340"
      - "7842/udp"
    ports:
      - "${IROH_RELAY_HOST_BIND_IP:-0.0.0.0}:3340:3340"
      - "${IROH_RELAY_HOST_BIND_IP:-0.0.0.0}:7842:7842/udp"
    volumes:
      - "${IROH_RELAY_CERTS_HOST_PATH:-./docker/iroh-relay/certs}:/certs:ro"
    networks:
      - cn

  admin-api:
    <<: *cn-service
    command: ["admin-api"]
    profiles:
      - admin
    environment:
      ADMIN_API_ADDR: ${ADMIN_API_ADDR}
    expose:
      - "8081"
    ports:
      - "8081:8081"

  admin-console:
    image: node:20-bookworm
    profiles:
      - admin
    working_dir: /app
    volumes:
      - ./apps/admin-console:/app
    environment:
      CI: "true"
      VITE_ADMIN_API_BASE: /admin-api
    command:
      [
        "bash",
        "-lc",
        "corepack enable && pnpm install --no-frozen-lockfile && pnpm dev --host 0.0.0.0 --port 5173",
      ]
    networks:
      - cn

  bootstrap:
    <<: *cn-service
    command: ["bootstrap"]
    profiles:
      - bootstrap
    environment:
      BOOTSTRAP_ADDR: ${BOOTSTRAP_ADDR}
    volumes:
      - cn_data:/data
    expose:
      - "8083"
    ports:
      - "8083:8083"

  index:
    <<: *cn-service
    command: ["index"]
    profiles:
      - index
    environment:
      INDEX_ADDR: ${INDEX_ADDR}
    depends_on:
      - postgres
    expose:
      - "8084"

  moderation:
    <<: *cn-service
    command: ["moderation"]
    profiles:
      - moderation
      - trust
    environment:
      MODERATION_ADDR: ${MODERATION_ADDR}
    volumes:
      - cn_data:/data
    expose:
      - "8085"

  ollama:
    image: ollama/ollama:latest
    profiles:
      - llm-local
    volumes:
      - ollama_data:/root/.ollama
    expose:
      - "11434"
    networks:
      - cn

  trust:
    <<: *cn-service
    command: ["trust"]
    profiles:
      - trust
    depends_on:
      - postgres
      - moderation
    environment:
      TRUST_ADDR: ${TRUST_ADDR}
    volumes:
      - cn_data:/data
    expose:
      - "8086"

  caddy:
    image: caddy:2.7.6
    depends_on:
      - user-api
      - relay
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - cn

  prometheus:
    image: prom/prometheus:v2.51.2
    profiles:
      - observability
    volumes:
      - ./docker/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks:
      - cn

  grafana:
    image: grafana/grafana:10.4.2
    profiles:
      - observability
    ports:
      - "3000:3000"
    networks:
      - cn

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.95.0
    profiles:
      - observability
    command: ["--config=/etc/otel-collector.yml"]
    volumes:
      - ./docker/observability/otel-collector.yml:/etc/otel-collector.yml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
    networks:
      - cn

  cn-cli:
    <<: *cn-service
    profiles:
      - tools
    command: ["--help"]
    volumes:
      - cn_data:/data

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
  cn_data:
  ollama_data:

networks:
  cn:
