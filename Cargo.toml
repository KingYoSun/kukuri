[workspace]
members = [
    "next/xtask",
    "next/crates/core",
    "next/crates/store",
    "next/crates/transport",
    "next/crates/harness",
    "next/crates/app-api",
    "next/crates/desktop-runtime",
]
exclude = [
    "kukuri-community-node",
    "kukuri-tauri/src-tauri",
    "next/apps/desktop/src-tauri",
]
resolver = "2"

[workspace.package]
edition = "2024"
license = "MIT"
version = "0.1.0"

[workspace.dependencies]
anyhow = "1.0.101"
async-trait = "0.1.89"
blake3 = "1.8.3"
chrono = { version = "0.4.43", features = ["serde"] }
futures-util = "0.3.32"
hex = "0.4.3"
iroh = { version = "0.96.1", features = ["address-lookup-mdns"] }
iroh-gossip = "0.96.0"
nostr-sdk = { version = "0.44.1", features = ["nip04", "nip44"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
serde_yaml = "0.9.34"
sqlx = { version = "0.8.6", features = ["runtime-tokio-rustls", "sqlite", "migrate"] }
thiserror = "2.0.18"
tokio = { version = "1.49.0", features = ["macros", "rt-multi-thread", "sync", "time", "fs"] }
tokio-stream = { version = "0.1.17", features = ["sync"] }
tracing = "0.1.44"
tracing-subscriber = { version = "0.3.20", features = ["env-filter"] }
tempfile = "3.25.0"
