[package]
name = "next-desktop-tauri"
version = "0.1.0"
edition = "2024"
default-run = "next-desktop-tauri"

[lib]
name = "next_desktop_tauri_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2.5.5", features = [] }

[dependencies]
next-app-api = { path = "../../../crates/app-api" }
next-desktop-runtime = { path = "../../../crates/desktop-runtime" }
serde = { version = "1.0.228", features = ["derive"] }
tauri = { version = "2.10.2", features = [] }
