x-cn-postgres-env: &cn-postgres-env
  POSTGRES_USER: ${CN_POSTGRES_USER:-cn}
  POSTGRES_PASSWORD: ${CN_POSTGRES_PASSWORD:?set CN_POSTGRES_PASSWORD}
  POSTGRES_DB: ${CN_POSTGRES_DB:-cn}

x-cn-service-env: &cn-service-env
  COMMUNITY_NODE_DATABASE_URL: postgres://${CN_POSTGRES_USER:-cn}:${CN_POSTGRES_PASSWORD:?set CN_POSTGRES_PASSWORD}@cn-postgres:5432/${CN_POSTGRES_DB:-cn}
  COMMUNITY_NODE_BASE_URL: ${CN_BASE_URL:-http://127.0.0.1:18080}
  COMMUNITY_NODE_PUBLIC_BASE_URL: ${CN_PUBLIC_BASE_URL:-http://127.0.0.1:18080}
  COMMUNITY_NODE_CONNECTIVITY_URLS: ${COMMUNITY_NODE_CONNECTIVITY_URLS:-http://127.0.0.1:13340}

services:
  cn-postgres:
    image: postgres:17-bookworm
    environment: *cn-postgres-env
    ports:
      - "${CN_POSTGRES_HOST_BIND_IP:-127.0.0.1}:${CN_POSTGRES_PORT:-55432}:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${CN_POSTGRES_USER:-cn} -d ${CN_POSTGRES_DB:-cn}",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - cn-postgres-data:/var/lib/postgresql/data

  cn-migrate:
    build:
      context: .
      dockerfile: docker/cn/Dockerfile
      args:
        TARGET_PACKAGE: kukuri-cn-cli
        TARGET_BIN: cn-cli
    depends_on:
      cn-postgres:
        condition: service_healthy
    environment: *cn-service-env
    command:
      [
        "--database-url",
        "postgres://${CN_POSTGRES_USER:-cn}:${CN_POSTGRES_PASSWORD:?set CN_POSTGRES_PASSWORD}@cn-postgres:5432/${CN_POSTGRES_DB:-cn}",
        "prepare",
      ]
    restart: "no"

  cn-user-api:
    build:
      context: .
      dockerfile: docker/cn/Dockerfile
      args:
        TARGET_PACKAGE: kukuri-cn-user-api
        TARGET_BIN: cn-user-api
    depends_on:
      cn-migrate:
        condition: service_completed_successfully
    environment:
      <<: *cn-service-env
      COMMUNITY_NODE_BIND_ADDR: 0.0.0.0:8080
      COMMUNITY_NODE_DATABASE_INIT_MODE: require_ready
      COMMUNITY_NODE_JWT_ISSUER: ${COMMUNITY_NODE_JWT_ISSUER:-kukuri-cn}
      COMMUNITY_NODE_JWT_SECRET: ${COMMUNITY_NODE_JWT_SECRET:?set COMMUNITY_NODE_JWT_SECRET}
      COMMUNITY_NODE_JWT_TTL_SECONDS: ${COMMUNITY_NODE_JWT_TTL_SECONDS:-86400}
    ports:
      - "${CN_USER_API_HOST_BIND_IP:-127.0.0.1}:${CN_USER_API_PORT:-18080}:8080"

  cn-iroh-relay:
    build:
      context: .
      dockerfile: docker/cn/Dockerfile
      args:
        TARGET_PACKAGE: kukuri-cn-iroh-relay
        TARGET_BIN: cn-iroh-relay
    environment:
      COMMUNITY_NODE_IROH_RELAY_HTTP_BIND_ADDR: ${CN_IROH_RELAY_HTTP_BIND_ADDR:-0.0.0.0:3340}
      COMMUNITY_NODE_IROH_RELAY_HTTPS_BIND_ADDR: ${CN_IROH_RELAY_HTTPS_BIND_ADDR:-}
      COMMUNITY_NODE_IROH_RELAY_QUIC_BIND_ADDR: ${CN_IROH_RELAY_QUIC_BIND_ADDR:-}
      COMMUNITY_NODE_IROH_RELAY_TLS_CERT_PATH: ${CN_IROH_RELAY_TLS_CERT_PATH:-}
      COMMUNITY_NODE_IROH_RELAY_TLS_KEY_PATH: ${CN_IROH_RELAY_TLS_KEY_PATH:-}
    volumes:
      - ${CN_IROH_RELAY_CERTS_HOST_PATH:-./docker/cn/certs}:/certs:ro
    ports:
      - "${CN_IROH_RELAY_HTTP_HOST_BIND_IP:-127.0.0.1}:${CN_IROH_RELAY_PORT:-13340}:3340"
      - "${CN_IROH_RELAY_HTTPS_HOST_BIND_IP:-127.0.0.1}:${CN_IROH_RELAY_HTTPS_PORT:-13443}:3443"
      - "${CN_IROH_RELAY_QUIC_HOST_BIND_IP:-127.0.0.1}:${CN_IROH_RELAY_QUIC_PORT:-17842}:7842/udp"

volumes:
  cn-postgres-data:
