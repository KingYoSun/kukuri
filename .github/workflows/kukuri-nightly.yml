name: Kukuri Nightly

on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTC_WRAPPER: sccache
  SCCACHE_GHA_ENABLED: 'true'
  SCCACHE_GHA_VERSION: v1

jobs:
  linux-rust-static:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust 1.89
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.89.0
          components: clippy,rustfmt

      - name: Install Linux system dependencies
        run: >
          sudo apt-get update &&
          sudo apt-get install -y
          pkg-config
          libdbus-1-dev
          libglib2.0-dev
          libgtk-3-dev
          libwebkit2gtk-4.1-dev
          libayatana-appindicator3-dev
          librsvg2-dev
          patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: kukuri-nightly-${{ runner.os }}-${{ github.job }}

      - name: Doctor
        run: cargo xtask doctor

      - name: Rust checks
        run: cargo xtask rust-check

      - name: Tauri compile check
        run: cargo xtask tauri-check

      - name: Show sccache stats
        if: always()
        shell: bash
        run: |
          if [ -n "${SCCACHE_PATH:-}" ]; then
            "$SCCACHE_PATH" --show-stats || true
          elif command -v sccache >/dev/null 2>&1; then
            sccache --show-stats || true
          fi

  linux-rust-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust 1.89
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.89.0

      - name: Install Linux system dependencies
        run: >
          sudo apt-get update &&
          sudo apt-get install -y
          pkg-config
          libdbus-1-dev
          libglib2.0-dev
          libgtk-3-dev
          libwebkit2gtk-4.1-dev
          libayatana-appindicator3-dev
          librsvg2-dev
          patchelf

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: kukuri-nightly-${{ runner.os }}-${{ github.job }}

      - name: Install nextest
        uses: taiki-e/install-action@nextest

      - name: Rust tests
        run: cargo xtask rust-test

      - name: Show sccache stats
        if: always()
        shell: bash
        run: |
          if [ -n "${SCCACHE_PATH:-}" ]; then
            "$SCCACHE_PATH" --show-stats || true
          elif command -v sccache >/dev/null 2>&1; then
            sccache --show-stats || true
          fi

  linux-desktop-ui:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust 1.89
