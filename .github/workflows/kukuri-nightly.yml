name: Kukuri Nightly

on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:

jobs:
  linux-nightly:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust 1.89
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.89.0
          components: clippy,rustfmt

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Linux system dependencies
        run: >
          sudo apt-get update &&
          sudo apt-get install -y
          pkg-config
          libdbus-1-dev
          libglib2.0-dev
          libgtk-3-dev
          libwebkit2gtk-4.1-dev
          libayatana-appindicator3-dev
          librsvg2-dev
          patchelf

      - name: Install desktop dependencies
        working-directory: apps/desktop
        run: npx pnpm@10.16.1 install --frozen-lockfile

      - name: Install Playwright Chromium
        working-directory: apps/desktop
        run: npx pnpm@10.16.1 exec playwright install chromium

      - name: Doctor
        run: cargo xtask doctor

      - name: Desktop UI checks
        run: cargo xtask desktop-ui-check

      - name: Workspace tests
        run: cargo xtask test

      - name: Community-node integration tests
        run: cargo xtask cn-test

      - name: E2E smoke
        run: cargo xtask e2e-smoke

      - name: Community-node connectivity scenario
        run: cargo xtask scenario community_node_public_connectivity

      - name: Community-node multi-device scenario
        run: cargo xtask scenario community_node_multi_device_connectivity

      - name: Upload kukuri artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kukuri-nightly-artifacts
          path: test-results/kukuri/
          if-no-files-found: warn
