          libglib2.0-dev
          libgtk-3-dev
          libwebkit2gtk-4.1-dev
          libayatana-appindicator3-dev
          librsvg2-dev
          patchelf

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.16.1
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/desktop/pnpm-lock.yaml

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: kukuri-nightly-${{ runner.os }}-${{ github.job }}

      - name: Install desktop dependencies
        working-directory: apps/desktop
        run: pnpm install --frozen-lockfile

      - name: Desktop lint + typecheck
        run: cargo xtask desktop-lint

      - name: Desktop Vitest
        run: cargo xtask desktop-test

      - name: Show sccache stats
        if: always()
        shell: bash
        run: |
          if [ -n "${SCCACHE_PATH:-}" ]; then
            "$SCCACHE_PATH" --show-stats || true
