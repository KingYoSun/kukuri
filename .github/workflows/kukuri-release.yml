name: Kukuri Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to create or update (example: v0.1.0-preview.1)'
        required: true
        type: string
      draft:
        description: 'Create the GitHub Release as a draft'
        required: false
        default: true
        type: boolean

jobs:
  windows-release:
    runs-on: windows-latest
    timeout-minutes: 90
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
      RELEASE_DRAFT: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.draft || 'false' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust 1.89
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.89.0
          components: clippy,rustfmt

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install desktop dependencies
        working-directory: apps/desktop
        run: npx pnpm@10.16.1 install --frozen-lockfile

      - name: Doctor
        run: cargo xtask doctor

      - name: Desktop UI checks
        run: cargo xtask desktop-ui-check

      - name: Workspace checks
        run: cargo xtask check

      - name: Community-node integration tests
        run: cargo xtask cn-test

      - name: E2E smoke
        run: cargo xtask e2e-smoke

      - name: Build Windows package
        run: cargo xtask desktop-package

      - name: Upload NSIS artifact
        uses: actions/upload-artifact@v4
        with:
          name: kukuri-windows-release-nsis
          path: apps/desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/
          if-no-files-found: error

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          target_commitish: ${{ github.sha }}
          draft: ${{ env.RELEASE_DRAFT == 'true' }}
          generate_release_notes: true
          files: |
            apps/desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
            apps/desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.msi
