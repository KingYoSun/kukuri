name: Kukuri Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to create or update (example: v0.1.0-preview.1)'
        required: true
        type: string
      draft:
        description: 'Create the GitHub Release as a draft'
        required: false
        default: true
        type: boolean

env:
  CARGO_TERM_COLOR: always
  RUSTC_WRAPPER: sccache
  SCCACHE_GHA_ENABLED: 'true'
  SCCACHE_GHA_VERSION: v1

jobs:
  linux-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust 1.89
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.89.0
          components: clippy,rustfmt

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/desktop/pnpm-lock.yaml

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: kukuri-release-${{ runner.os }}-${{ github.job }}

      - name: Install nextest
        uses: taiki-e/install-action@nextest

      - name: Doctor
        run: cargo xtask doctor

      - name: Rust checks
        run: cargo xtask rust-check

      - name: Install Linux system dependencies
        run: >
          sudo apt-get update &&
          sudo apt-get install -y
          pkg-config
          libdbus-1-dev
          libglib2.0-dev
          libgtk-3-dev
          libwebkit2gtk-4.1-dev
          libayatana-appindicator3-dev
          librsvg2-dev
          patchelf

      - name: Tauri compile check
        run: cargo xtask tauri-check

      - name: Install desktop dependencies
        working-directory: apps/desktop
        run: npx pnpm@10.16.1 install --frozen-lockfile

      - name: Install Playwright Chromium
        working-directory: apps/desktop
        run: npx pnpm@10.16.1 exec playwright install chromium

      - name: Rust tests
        run: cargo xtask rust-test

      - name: Desktop lint + typecheck
        run: cargo xtask desktop-lint

      - name: Desktop Vitest
        run: cargo xtask desktop-test

      - name: Desktop Storybook build
        run: cargo xtask desktop-storybook

      - name: Desktop browser tests
        run: cargo xtask desktop-browser-test

      - name: Community-node checks
        run: cargo xtask cn-check

      - name: Community-node integration tests
        run: cargo xtask cn-test

      - name: E2E smoke
        run: cargo xtask e2e-smoke

      - name: Community-node connectivity scenario
        run: cargo xtask scenario community_node_public_connectivity

      - name: Upload Linux verify artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kukuri-release-linux-artifacts
          path: test-results/kukuri/
          if-no-files-found: warn

      - name: Show sccache stats
        if: always()
        run: sccache --show-stats || true

  windows-release:
    needs: linux-verify
    runs-on: windows-latest
    timeout-minutes: 90
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
      RELEASE_DRAFT: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.draft || 'false' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust 1.89
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.89.0
          components: clippy,rustfmt

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/desktop/pnpm-lock.yaml

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: kukuri-release-${{ runner.os }}-${{ github.job }}
          workspaces: |
            . -> target
            apps/desktop/src-tauri -> target

      - name: Install desktop dependencies
        working-directory: apps/desktop
        run: npx pnpm@10.16.1 install --frozen-lockfile

      - name: Doctor
        run: cargo xtask doctor

      - name: Windows Tauri compile check
        run: cargo xtask tauri-check

      - name: Build Windows package
        run: cargo xtask desktop-package

      - name: Upload NSIS artifact
        uses: actions/upload-artifact@v4
        with:
          name: kukuri-windows-release-nsis
          path: apps/desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/
          if-no-files-found: error

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          target_commitish: ${{ github.sha }}
          draft: ${{ env.RELEASE_DRAFT == 'true' }}
          generate_release_notes: true
          files: |
            apps/desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
            apps/desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.msi

      - name: Show sccache stats
        if: always()
        shell: pwsh
        run: |
          if (Get-Command sccache -ErrorAction SilentlyContinue) {
            sccache --show-stats
          }
