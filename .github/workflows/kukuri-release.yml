name: Kukuri Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to create or update (example: v0.1.0-preview.1)'
        required: true
        type: string
      draft:
        description: 'Create the GitHub Release as a draft'
        required: false
        default: true
        type: boolean

env:
  CARGO_TERM_COLOR: always
  RUSTC_WRAPPER: sccache
  SCCACHE_GHA_ENABLED: 'true'
  SCCACHE_GHA_VERSION: v1
  PNPM_VERSION: 10.16.1

jobs:
  validate-release-inputs:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      release_tag: ${{ steps.release.outputs.release_tag }}
      release_draft: ${{ steps.release.outputs.release_draft }}
      release_version: ${{ steps.release.outputs.release_version }}
    steps:
      - name: Resolve release input
        id: release
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="${{ github.event.inputs.tag }}"
            draft="${{ github.event.inputs.draft }}"
          else
            tag="${GITHUB_REF_NAME}"
            draft="true"
          fi
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-preview\.[0-9]+$ ]]; then
            echo "Release tag must match vX.Y.Z-preview.N: $tag" >&2
            exit 1
          fi
          version="${tag#v}"
          version="${version%%-preview.*}"
          {
            echo "release_tag=$tag"
            echo "release_draft=$draft"
            echo "release_version=$version"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ steps.release.outputs.release_tag }}

      - name: Install Rust 1.91
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.91.0

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Release version gate
        run: cargo xtask release-check ${{ steps.release.outputs.release_tag }}

  linux-verify:
    needs: validate-release-inputs
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ needs.validate-release-inputs.outputs.release_tag }}

      - name: Install Rust 1.91
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.91.0
          components: clippy,rustfmt

      - name: Install Linux system dependencies
        run: >
          sudo apt-get update &&
          sudo apt-get install -y
          pkg-config
          libdbus-1-dev
          libglib2.0-dev
          libgtk-3-dev
          libwebkit2gtk-4.1-dev
          libayatana-appindicator3-dev
          librsvg2-dev
          patchelf

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/desktop/pnpm-lock.yaml

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: kukuri-release-${{ runner.os }}-${{ github.job }}

      - name: Install nextest
        uses: taiki-e/install-action@nextest

      - name: Doctor
        run: cargo xtask doctor

      - name: Release version gate
        run: cargo xtask release-check ${{ needs.validate-release-inputs.outputs.release_tag }}

      - name: Rust checks
        run: cargo xtask rust-check

      - name: Tauri compile check
        run: cargo xtask tauri-check

      - name: Install desktop dependencies
        working-directory: apps/desktop
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        working-directory: apps/desktop
        run: pnpm exec playwright install chromium

      - name: Rust tests
        run: cargo xtask rust-test

      - name: Desktop lint + typecheck
        run: cargo xtask desktop-lint

      - name: Desktop Vitest
        run: cargo xtask desktop-test

      - name: Desktop Storybook build
        run: cargo xtask desktop-storybook

      - name: Desktop browser tests
        run: cargo xtask desktop-browser-test

      - name: Community-node checks
        run: cargo xtask cn-check

      - name: Community-node integration tests
        run: cargo xtask cn-test

      - name: E2E smoke
        run: cargo xtask e2e-smoke

      - name: Community-node connectivity scenario
        run: cargo xtask scenario community_node_public_connectivity

      - name: Upload Linux verify artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kukuri-release-linux-artifacts
          path: test-results/kukuri/
          if-no-files-found: warn

  windows-package:
    needs: [validate-release-inputs, linux-verify]
    runs-on: windows-latest
    timeout-minutes: 90
    permissions:
      contents: read
      id-token: write
      attestations: write
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      TAURI_UPDATER_PUBLIC_KEY: ${{ secrets.TAURI_UPDATER_PUBLIC_KEY }}
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ needs.validate-release-inputs.outputs.release_tag }}

      - name: Install Rust 1.91
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.91.0
          components: clippy,rustfmt

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/desktop/pnpm-lock.yaml

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: kukuri-release-${{ runner.os }}-${{ github.job }}
          workspaces: |
            . -> target
            apps/desktop/src-tauri -> target

      - name: Install desktop dependencies
        working-directory: apps/desktop
        run: pnpm install --frozen-lockfile

      - name: Release version gate
        run: cargo xtask release-check ${{ needs.validate-release-inputs.outputs.release_tag }}

      - name: Configure updater signing key
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:TAURI_SIGNING_PRIVATE_KEY)) {
            throw "TAURI_SIGNING_PRIVATE_KEY secret is required for preview updater artifacts"
          }
          if ([string]::IsNullOrWhiteSpace($env:TAURI_UPDATER_PUBLIC_KEY)) {
            throw "TAURI_UPDATER_PUBLIC_KEY secret is required and must match TAURI_SIGNING_PRIVATE_KEY"
          }
          $configPath = "apps/desktop/src-tauri/tauri.conf.json"
          $config = Get-Content -LiteralPath $configPath -Raw | ConvertFrom-Json
          $config.plugins.updater.pubkey = $env:TAURI_UPDATER_PUBLIC_KEY.Trim()
          $config | ConvertTo-Json -Depth 100 | Set-Content -LiteralPath $configPath -Encoding UTF8

      - name: Windows Tauri compile check
        run: cargo xtask tauri-check

      - name: Build Windows package
        run: cargo xtask desktop-package

      - name: Upload Windows bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: kukuri-windows-preview-bundle
          path: apps/desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/
          if-no-files-found: error

      - name: Attest Windows bundle
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: apps/desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*

  release-assets:
    needs: [validate-release-inputs, windows-package]
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ needs.validate-release-inputs.outputs.release_tag }}

      - name: Release asset script smoke
        shell: pwsh
        run: ./scripts/release/test-create-preview-assets.ps1

      - name: Download Windows bundle artifact
        uses: actions/download-artifact@v4
        with:
          name: kukuri-windows-preview-bundle
          path: dist/windows-input

      - name: Generate release assets
        shell: pwsh
        run: >
          ./scripts/release/create-preview-assets.ps1
          -Tag '${{ needs.validate-release-inputs.outputs.release_tag }}'
          -Repository '${{ github.repository }}'
          -Version '${{ needs.validate-release-inputs.outputs.release_version }}'
          -InputDir 'dist/windows-input'
          -OutputDir 'dist/release-assets'

      - name: Upload release assets
        uses: actions/upload-artifact@v4
        with:
          name: kukuri-release-assets
          path: dist/release-assets/
          if-no-files-found: error

  publish-draft:
    needs: [validate-release-inputs, release-assets]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          name: kukuri-release-assets
          path: dist/release-assets

      - name: Publish draft GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.validate-release-inputs.outputs.release_tag }}
          draft: ${{ needs.validate-release-inputs.outputs.release_draft == 'true' }}
          fail_on_unmatched_files: true
          body_path: dist/release-assets/RELEASE_NOTES_DRAFT.md
          files: |
            dist/release-assets/*
