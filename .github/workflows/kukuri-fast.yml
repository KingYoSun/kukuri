name: Kukuri Fast

on:
  pull_request:
    paths:
      - '.config/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
      - '.cargo/**'
      - 'xtask/**'
      - 'crates/**'
      - 'apps/**'
      - 'docs/**'
      - 'harness/**'
      - '.github/workflows/kukuri-fast.yml'
      - '.github/workflows/kukuri-nightly.yml'
      - '.github/workflows/kukuri-release.yml'
  push:
    branches: [main, develop]
    paths:
      - '.config/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
      - '.cargo/**'
      - 'xtask/**'
      - 'crates/**'
      - 'apps/**'
      - 'docs/**'
      - 'harness/**'
      - '.github/workflows/kukuri-fast.yml'
      - '.github/workflows/kukuri-nightly.yml'
      - '.github/workflows/kukuri-release.yml'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTC_WRAPPER: sccache
  SCCACHE_GHA_ENABLED: 'true'
  SCCACHE_GHA_VERSION: v1

jobs:
  linux-rust-static:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust 1.89
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.89.0
          components: clippy,rustfmt

      - name: Install Linux system dependencies
        run: >
          sudo apt-get update &&
          sudo apt-get install -y
          pkg-config
          libdbus-1-dev
          libglib2.0-dev
          libgtk-3-dev
          libwebkit2gtk-4.1-dev
          libayatana-appindicator3-dev
          librsvg2-dev
          patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: kukuri-fast-${{ runner.os }}-${{ github.job }}

      - name: Doctor
        run: cargo xtask doctor

      - name: Rust checks
        run: cargo xtask rust-check

      - name: Tauri compile check
        run: cargo xtask tauri-check

      - name: Show sccache stats
        if: always()
        shell: bash
        run: |
          if [ -n "${SCCACHE_PATH:-}" ]; then
            "$SCCACHE_PATH" --show-stats || true
          elif command -v sccache >/dev/null 2>&1; then
            sccache --show-stats || true
          fi

  linux-rust-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust 1.89
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.89.0

      - name: Install Linux system dependencies
        run: >
          sudo apt-get update &&
          sudo apt-get install -y
          pkg-config
          libdbus-1-dev
          libglib2.0-dev
          libgtk-3-dev
          libwebkit2gtk-4.1-dev
          libayatana-appindicator3-dev
          librsvg2-dev
          patchelf

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: kukuri-fast-${{ runner.os }}-${{ github.job }}

      - name: Install nextest
        uses: taiki-e/install-action@nextest

      - name: Rust tests
        run: cargo xtask rust-test

      - name: Show sccache stats
        if: always()
        shell: bash
        run: |
          if [ -n "${SCCACHE_PATH:-}" ]; then
            "$SCCACHE_PATH" --show-stats || true
          elif command -v sccache >/dev/null 2>&1; then
            sccache --show-stats || true
          fi

  linux-desktop-ui:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust 1.89
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.89.0

      - name: Install Linux system dependencies
        run: >
          sudo apt-get update &&
          sudo apt-get install -y
          pkg-config
          libdbus-1-dev
          libglib2.0-dev
          libgtk-3-dev
          libwebkit2gtk-4.1-dev
          libayatana-appindicator3-dev
          librsvg2-dev
          patchelf

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.16.1
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/desktop/pnpm-lock.yaml

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: kukuri-fast-${{ runner.os }}-${{ github.job }}

      - name: Install desktop dependencies
        working-directory: apps/desktop
        run: pnpm install --frozen-lockfile

      - name: Desktop lint + typecheck
        run: cargo xtask desktop-lint

      - name: Desktop Vitest
        run: cargo xtask desktop-test

      - name: Show sccache stats
        if: always()
        shell: bash
        run: |
          if [ -n "${SCCACHE_PATH:-}" ]; then
            "$SCCACHE_PATH" --show-stats || true
          elif command -v sccache >/dev/null 2>&1; then
            sccache --show-stats || true
          fi

  linux-desktop-browser:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust 1.89
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.89.0

      - name: Install Linux system dependencies
        run: >
          sudo apt-get update &&
          sudo apt-get install -y
          pkg-config
          libdbus-1-dev
          libglib2.0-dev
          libgtk-3-dev
          libwebkit2gtk-4.1-dev
          libayatana-appindicator3-dev
          librsvg2-dev
          patchelf

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.16.1
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/desktop/pnpm-lock.yaml

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: kukuri-fast-${{ runner.os }}-${{ github.job }}

      - name: Install desktop dependencies
        working-directory: apps/desktop
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        working-directory: apps/desktop
        run: pnpm exec playwright install chromium

      - name: Desktop Storybook build
        run: cargo xtask desktop-storybook

      - name: Desktop browser tests
        run: cargo xtask desktop-browser-test

      - name: Show sccache stats
        if: always()
        shell: bash
        run: |
          if [ -n "${SCCACHE_PATH:-}" ]; then
            "$SCCACHE_PATH" --show-stats || true
          elif command -v sccache >/dev/null 2>&1; then
            sccache --show-stats || true
          fi

  linux-cn:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust 1.89
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.89.0

      - name: Install Linux system dependencies
        run: >
          sudo apt-get update &&
          sudo apt-get install -y
          pkg-config
          libdbus-1-dev
          libglib2.0-dev
          libgtk-3-dev
          libwebkit2gtk-4.1-dev
          libayatana-appindicator3-dev
          librsvg2-dev
          patchelf

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: kukuri-fast-${{ runner.os }}-${{ github.job }}

      - name: Community-node checks
        run: cargo xtask cn-check

      - name: Community-node integration tests
        run: cargo xtask cn-test

      - name: Show sccache stats
        if: always()
        shell: bash
        run: |
          if [ -n "${SCCACHE_PATH:-}" ]; then
            "$SCCACHE_PATH" --show-stats || true
          elif command -v sccache >/dev/null 2>&1; then
            sccache --show-stats || true
          fi

  linux-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust 1.89
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.89.0

      - name: Install Linux system dependencies
        run: >
          sudo apt-get update &&
          sudo apt-get install -y
          pkg-config
          libdbus-1-dev
          libglib2.0-dev
          libgtk-3-dev
          libwebkit2gtk-4.1-dev
          libayatana-appindicator3-dev
          librsvg2-dev
          patchelf

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: kukuri-fast-${{ runner.os }}-${{ github.job }}

      - name: E2E smoke
        run: cargo xtask e2e-smoke

      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kukuri-fast-smoke-artifacts
          path: test-results/kukuri/
          if-no-files-found: warn

      - name: Show sccache stats
        if: always()
        shell: bash
        run: |
          if [ -n "${SCCACHE_PATH:-}" ]; then
            "$SCCACHE_PATH" --show-stats || true
          elif command -v sccache >/dev/null 2>&1; then
            sccache --show-stats || true
          fi

  linux-community-node:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust 1.89
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.89.0

      - name: Install Linux system dependencies
        run: >
          sudo apt-get update &&
          sudo apt-get install -y
          pkg-config
          libdbus-1-dev
          libglib2.0-dev
          libgtk-3-dev
          libwebkit2gtk-4.1-dev
          libayatana-appindicator3-dev
          librsvg2-dev
          patchelf

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: kukuri-fast-${{ runner.os }}-${{ github.job }}

      - name: Community-node connectivity scenario
        run: cargo xtask scenario community_node_public_connectivity

      - name: Upload community-node artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kukuri-fast-community-node-artifacts
          path: test-results/kukuri/
          if-no-files-found: warn

      - name: Show sccache stats
        if: always()
        shell: bash
        run: |
          if [ -n "${SCCACHE_PATH:-}" ]; then
            "$SCCACHE_PATH" --show-stats || true
          elif command -v sccache >/dev/null 2>&1; then
            sccache --show-stats || true
          fi

  windows-fast:
    runs-on: windows-latest
    timeout-minutes: 75
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust 1.89
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.89.0
          components: clippy,rustfmt

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.16.1
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/desktop/pnpm-lock.yaml

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: kukuri-fast-${{ runner.os }}-${{ github.job }}
          workspaces: |
            . -> target
            apps/desktop/src-tauri -> target

      - name: Install desktop dependencies
        working-directory: apps/desktop
        run: pnpm install --frozen-lockfile

      - name: Doctor
        run: cargo xtask doctor

      - name: Windows Tauri compile check
        timeout-minutes: 20
        run: cargo xtask tauri-check

      - name: E2E smoke
        timeout-minutes: 15
        run: cargo xtask e2e-smoke

      - name: Windows package
        timeout-minutes: 25
        run: cargo xtask desktop-package

      - name: Upload kukuri artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kukuri-windows-fast-artifacts
          path: test-results/kukuri/
          if-no-files-found: warn

      - name: Upload NSIS installer
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kukuri-windows-nsis
          path: apps/desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/
          if-no-files-found: warn

      - name: Show sccache stats
        if: always()
        shell: pwsh
        run: |
          if ($env:SCCACHE_PATH) {
            & $env:SCCACHE_PATH --show-stats
          } elseif (Get-Command sccache -ErrorAction SilentlyContinue) {
            sccache --show-stats
          }
          exit 0
