name: Kukuri Fast

on:
  pull_request:
    paths:
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
      - '.cargo/**'
      - 'xtask/**'
      - 'crates/**'
      - 'apps/**'
      - 'docs/**'
      - 'harness/**'
      - '.github/workflows/kukuri-fast.yml'
      - '.github/workflows/kukuri-nightly.yml'
  push:
    branches: [main, develop]
    paths:
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
      - '.cargo/**'
      - 'xtask/**'
      - 'crates/**'
      - 'apps/**'
      - 'docs/**'
      - 'harness/**'
      - '.github/workflows/kukuri-fast.yml'
      - '.github/workflows/kukuri-nightly.yml'
  workflow_dispatch:

jobs:
  linux-fast:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust 1.89
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.89.0
          components: clippy,rustfmt

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Linux system dependencies
        run: >
          sudo apt-get update &&
          sudo apt-get install -y
          pkg-config
          libdbus-1-dev
          libglib2.0-dev
          libgtk-3-dev
          libwebkit2gtk-4.1-dev
          libayatana-appindicator3-dev
          librsvg2-dev
          patchelf

      - name: Install desktop dependencies
        working-directory: apps/desktop
        run: npx pnpm@10.16.1 install --frozen-lockfile

      - name: Doctor
        run: cargo xtask doctor

      - name: Fast checks
        run: cargo xtask check

      - name: Community-node checks
        run: cargo xtask cn-check

      - name: Community-node integration tests
        run: cargo xtask cn-test

      - name: E2E smoke
        run: cargo xtask e2e-smoke

      - name: Community-node connectivity scenario
        run: cargo xtask scenario community_node_public_connectivity

      - name: Upload kukuri artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kukuri-fast-artifacts
          path: test-results/kukuri/
          if-no-files-found: warn

  windows-fast:
    runs-on: windows-latest
    timeout-minutes: 75
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust 1.89
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.89.0
          components: clippy,rustfmt

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install desktop dependencies
        working-directory: apps/desktop
        run: npx pnpm@10.16.1 install --frozen-lockfile

      - name: Doctor
        run: cargo xtask doctor

      - name: Windows desktop compile
        timeout-minutes: 20
        run: cargo check --manifest-path apps/desktop/src-tauri/Cargo.toml

      - name: Windows desktop lint
        timeout-minutes: 10
        working-directory: apps/desktop
        run: npx pnpm@10.16.1 lint

      - name: Windows desktop typecheck
        timeout-minutes: 10
        working-directory: apps/desktop
        run: npx pnpm@10.16.1 typecheck

      - name: E2E smoke
        timeout-minutes: 15
        run: cargo xtask e2e-smoke

      - name: Windows package
        timeout-minutes: 25
        run: cargo xtask desktop-package

      - name: Upload kukuri artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kukuri-windows-fast-artifacts
          path: test-results/kukuri/
          if-no-files-found: warn

      - name: Upload NSIS installer
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kukuri-windows-nsis
          path: apps/desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/
          if-no-files-found: warn
